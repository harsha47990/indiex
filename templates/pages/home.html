<!-- pages/home.html — Home page content fragment (injected into layout.html) -->
<style>
  .home-hero {
    text-align: center;
    margin-top: 60px;
    margin-bottom: 48px;
  }
  .home-logo {
    width: 80px; height: 80px; border-radius: 18px;
    margin-bottom: 18px;
    filter: drop-shadow(0 4px 20px rgba(108,92,231,.35));
    animation: homeLogoFloat 3s ease-in-out infinite alternate;
  }
  @keyframes homeLogoFloat {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-6px); }
  }
  .home-hero h1 {
    font-size: 32px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .home-hero h1 span {
    background: linear-gradient(135deg, var(--primary), var(--success));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .home-greeting {
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Coin display */
  .home-coin-display {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 20px;
    padding: 10px 24px; border-radius: 24px;
    background: rgba(255,165,2,.08);
    border: 1px solid rgba(255,165,2,.2);
    font-size: 20px; font-weight: 700;
    color: var(--warning);
    animation: coinGlow 2s ease-in-out infinite alternate;
  }
  @keyframes coinGlow {
    0%   { box-shadow: 0 0 8px rgba(255,165,2,.1); }
    100% { box-shadow: 0 0 20px rgba(255,165,2,.2); }
  }
  .home-coin-display .coin-icon { font-size: 22px; }
  .home-coin-display .coin-label {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    margin-left: 4px;
  }

  /* Quick action cards */
  .home-actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
    max-width: 560px;
    margin: 0 auto;
  }
  .home-action {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    text-decoration: none; color: inherit;
    transition: all .3s;
    cursor: pointer;
  }
  .home-action:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(108,92,231,.12);
  }
  .home-action .action-icon {
    font-size: 36px;
    flex-shrink: 0;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    background: var(--surface-2);
    transition: background .3s;
  }
  .home-action:hover .action-icon { background: rgba(108,92,231,.1); }
  .home-action .action-text h3 {
    font-size: 15px; font-weight: 700; margin-bottom: 4px;
  }
  .home-action .action-text p {
    font-size: 12px; color: var(--text-dim); line-height: 1.5; margin: 0;
  }
  .home-action .action-arrow {
    margin-left: auto; font-size: 18px; color: var(--text-dim);
    transition: transform .3s, color .3s;
  }
  .home-action:hover .action-arrow { transform: translateX(4px); color: var(--primary); }
</style>

<div class="home-hero">
  <img src="/static/logo.png" alt="Indiex" class="home-logo" />
  <h1 id="home-hello">Hello 👋</h1>
  <p class="home-greeting" id="home-greeting"></p>
  <div class="home-coin-display">
    <span class="coin-icon">🪙</span>
    <span id="home-coin-val">—</span>
    <span class="coin-label">coins</span>
  </div>
</div>

<div class="home-actions">
  <a class="home-action" href="/games/teen-patti">
    <div class="action-icon"><img src="/static/3patti.png" alt="Teen Patti" style="width:40px;height:40px;border-radius:8px;"></div>
    <div class="action-text">
      <h3>Teen Patti</h3>
      <p>Create or join a room and play with friends</p>
    </div>
    <span class="action-arrow">→</span>
  </a>
  <a class="home-action" href="/games">
    <div class="action-icon">🎮</div>
    <div class="action-text">
      <h3>All Games</h3>
      <p>Browse all available games</p>
    </div>
    <span class="action-arrow">→</span>
  </a>
</div>

<script>
(async () => {
  // Time-based greeting
  const h = new Date().getHours();
  const timeGreet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';

  try {
    const res = await fetch('/api/user/me');
    if (res.ok) {
      const d = await res.json();
      const name = d.display_name || d.username || indiex.username;
      document.getElementById('home-hello').innerHTML = `${timeGreet}, <span>${name}</span>! 👋`;
      document.getElementById('home-greeting').textContent = 'Welcome back to Indiex';
      document.getElementById('home-coin-val').textContent = (d.coins ?? 0).toLocaleString();
    }
  } catch {
    document.getElementById('home-hello').innerHTML = `${timeGreet}, <span>${indiex.username}</span>! 👋`;
    document.getElementById('home-greeting').textContent = 'Welcome back to Indiex';
  }
})();
</script>
