<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Indiex — Reset Password</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --primary: #6c5ce7;
    --primary-hover: #7c6ff7;
    --text: #e2e2e8;
    --text-dim: #8888a0;
    --danger: #ff4757;
    --success: #2ed573;
    --warning: #ffa502;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 60%, rgba(255,165,2,.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(108,92,231,.1) 0%, transparent 50%);
    z-index: 0;
  }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px 40px;
    width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  .brand { text-align: center; margin-bottom: 12px; }
  .brand h1 {
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, var(--warning), var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .notice {
    background: rgba(255,165,2,.08);
    border: 1px solid rgba(255,165,2,.25);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 20px 0 28px;
    font-size: 13px;
    color: var(--warning);
    line-height: 1.5;
    text-align: center;
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 12px; color: var(--text-dim);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--primary); }

  .btn {
    width: 100%; padding: 13px;
    background: var(--primary); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s; margin-top: 8px;
  }
  .btn:hover { background: var(--primary-hover); }

  .msg { font-size: 13px; text-align: center; margin-top: 14px; min-height: 18px; }
  .msg.error { color: var(--danger); }
  .msg.success { color: var(--success); }

  .strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all .3s; }

  .pw-wrap { position: relative; }
  .pw-wrap input { width: 100%; padding-right: 42px; }
  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 4px;
    line-height: 1; transition: color .2s;
  }
  .pw-toggle:hover { color: var(--text); }
</style>
</head>
<body>

<div class="card">
  <div class="brand"><h1>🔐 Reset Password</h1></div>

  <div class="notice">
    Your account was just created by an administrator.<br>
    Please set a <strong>new password</strong> to continue.
  </div>

  <form onsubmit="handleReset(event)">
    <div class="field">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" id="new-pw" placeholder="Minimum 6 characters" required minlength="6" />
        <button type="button" class="pw-toggle" onclick="togglePw('new-pw', this)" title="Show password">👁</button>
      </div>
      <div class="strength" id="strength"></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirm-pw" placeholder="Re-enter your password" required />
        <button type="button" class="pw-toggle" onclick="togglePw('confirm-pw', this)" title="Show password">👁</button>
      </div>
    </div>
    <button class="btn" id="btn" type="submit">Set Password & Continue</button>
    <div class="msg" id="msg"></div>
  </form>
</div>

<script>
function _getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : '';
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
  btn.title = show ? 'Hide password' : 'Show password';
}

// Password strength indicator
document.getElementById('new-pw').addEventListener('input', (e) => {
  const bar = document.getElementById('strength');
  const v = e.target.value;
  let s = 0;
  if (v.length >= 6) s++;
  if (v.length >= 10) s++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
  if (/[^a-zA-Z0-9]/.test(v)) s++;
  const colors = ['var(--danger)', 'var(--warning)', '#f0e130', 'var(--success)'];
  const widths = ['25%', '50%', '75%', '100%'];
  bar.style.background = colors[Math.max(0, s-1)] || 'transparent';
  bar.style.width = s > 0 ? widths[s-1] : '0%';
});

async function handleReset(e) {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  msg.textContent = ''; msg.className = 'msg';

  const newPw = document.getElementById('new-pw').value;
  const confirmPw = document.getElementById('confirm-pw').value;

  if (newPw !== confirmPw) {
    msg.textContent = 'Passwords do not match';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_password: newPw, confirm_password: confirmPw }),
    });
    const data = await res.json();

    if (res.ok && data.ok) {
      msg.textContent = '✓ Password set! Redirecting…';
      msg.className = 'msg success';
      btn.style.background = 'var(--success)';
      btn.textContent = '✓ Done!';
      setTimeout(() => { window.location.href = '/home'; }, 800);
    } else {
      throw new Error(data.error || 'Failed to reset');
    }
  } catch (err) {
    msg.textContent = err.message;
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Set Password & Continue';
  }
}
</script>
</body>
</html>
